services:
  - type: web
    name: birdie-kpi-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHEETS_WEBAPP_URL
        sync: false   # Opción A: Apps Script Web App URL
      - key: SHEETS_CSV_URL
        sync: false   # Opción B: Sheet publicado como CSV (Archivo → Publicar en la web)
